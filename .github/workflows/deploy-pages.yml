name: Deploy to GitHub Pages

# Writes the static export into docs/ on main. For user sites (iYahya.github.io),
# GitHub serves /docs at the site root: https://iyahya.github.io/
#
# Settings → Pages → Build and deployment → Deploy from a branch:
#   Branch: main   Folder: /docs   (NOT / root — that only has README)

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: main
          destination_dir: docs
          commit_message: "deploy: GitHub Pages build [skip ci]"
